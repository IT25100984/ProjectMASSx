spring.application.name=projectmass

# Database URL (replace 'hospital' with your actual DB name)
spring.datasource.url=jdbc:mysql://localhost:3306/ProjectMASS
spring.datasource.username=root
spring.datasource.password=admin123

# This helps Spring Boot communicate with MySQL specifically
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# This shows the SQL in your console (very helpful for debugging!)
spring.jpa.show-sql=true

# Tell Spring where JSPs are and what their "endings" are
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp